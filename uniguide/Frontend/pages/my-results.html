<div id="page-my-results" class="page">
  <div class="my-results-page">
    <div class="my-results-header">
      <h1>📋 My Quiz Results</h1>
      <p>Your past major predictions — tap any major to view full details</p>
    </div>
    <div id="my-results-container" class="my-results-list">
      <!-- rendered by JS -->
    </div>
    <div class="my-results-actions">
      <button class="btn-retake" onclick="showPage('quiz-1');retakeQuiz()">🎯 Take Quiz Again</button>
      &nbsp;
      <button class="btn-retake" style="margin-top:0.5rem" onclick="showPage('home')">← Back to Home</button>
    </div>
  </div>
</div>
