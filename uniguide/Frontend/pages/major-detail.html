<!-- ═══════════════════════════════════════════════════
     PAGE: SUPER ADMIN LOGIN
═══════════════════════════════════════════════════ -->
<div id="page-sa-login" class="page">
  <div class="sa-auth-page">
    <div class="sa-auth-card">
      <div class="sa-auth-brand">
        <div class="sa-auth-shield">🛡️</div>
        <div class="sa-auth-badge">Super Admin Portal</div>
        <div class="sa-auth-title">Secure Access</div>
        <div class="sa-auth-subtitle">Sign in with your Super Admin credentials</div>
      </div>

      <div id="sa-alert" class="alert alert-error" style="display:none;margin-bottom:1rem;border-radius:10px"></div>

      <label class="sa-auth-label">Email Address</label>
      <input class="sa-auth-input" type="email" id="sal-email" placeholder="superadmin@uniguide.com"
        onkeydown="if(event.key==='Enter')doSALogin()">

      <label class="sa-auth-label">Password</label>
      <div style="position:relative;margin-bottom:0">
        <input class="sa-auth-input" type="password" id="sal-pass" placeholder="••••••••"
          style="margin-bottom:0;padding-right:2.75rem"
          onkeydown="if(event.key==='Enter')doSALogin()">
        <button onclick="togglePassVis('sal-pass',this)"
          style="position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:rgba(255,255,255,0.4)">👁</button>
      </div>
      <div style="margin-bottom:1.25rem"></div>

      <button class="sa-auth-btn" onclick="doSALogin()">🔐 Sign In as Super Admin</button>

      <div class="sa-auth-links">
        <a onclick="showPage('admin-login')" class="highlight">← Back to Admin Login</a>
        <a onclick="showPage('login')">Back to User Login</a>
      </div>

      <div class="sa-auth-demo">
        <div class="sa-auth-demo-label">Demo Credentials</div>
        <div class="sa-auth-demo-creds">super@uniguide.com &nbsp;/&nbsp; super123</div>
      </div>
    </div>
  </div>
</div>
