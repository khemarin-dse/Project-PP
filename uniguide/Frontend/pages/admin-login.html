<!-- ═══════════════════════════════════════════════════
     PAGE: ADMIN LOGIN
═══════════════════════════════════════════════════ -->
<div id="page-admin-login" class="page">
  <div class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-logo-wrap" onclick="showPage('home')">
        <span class="auth-logo-icon">🎓</span>
        <span class="auth-logo-text">UniGuide</span>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab active" style="border-bottom-color:#f59e0b;color:#f59e0b">Log In For Admin</div>
        </div>
        <div id="admin-alert" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" id="admin-name" placeholder="Admin name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="admin-email" placeholder="Admin email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="admin-pass" placeholder="Admin password">
        </div>
        <button class="btn-auth" style="background:linear-gradient(135deg,#d97706,#f59e0b)" onclick="doAdminLogin()">Log In as Admin</button>
        <p class="auth-note"><a onclick="showPage('sa-login')" class="auth-link-sa">Super Admin login →</a></p>
        <p class="auth-note" style="margin-top:0.25rem"><a onclick="showPage('login')">← Back to user login</a></p>
        <p class="auth-note" style="margin-top:0.75rem;font-size:0.72rem;color:rgba(255,255,255,0.2)">Demo: admin@uniguide.com / admin123</p>
      </div>
    </div>
  </div>
</div>
