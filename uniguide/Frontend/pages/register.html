<!-- ═══════════════════════════════════════════════════
     PAGE: REGISTER
═══════════════════════════════════════════════════ -->
<div id="page-register" class="page">
  <div class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-logo-wrap" onclick="showPage('home')">
        <span class="auth-logo-icon">🎓</span>
        <span class="auth-logo-text">UniGuide</span>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab active" onclick="showPage('register')">Sign Up</div>
          <div class="auth-tab" onclick="showPage('login')">Log In</div>
        </div>
        <div id="reg-alert" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" id="reg-name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="reg-pass" placeholder="Create a password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm" placeholder="Confirm your password">
        </div>
        <button class="btn-auth" onclick="doRegister()">Sign Up</button>
        <p class="auth-note">Already have an account? <a onclick="showPage('login')">Log in</a></p>
      </div>
    </div>
  </div>
</div>
