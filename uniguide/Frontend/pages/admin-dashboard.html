<!-- ═══════════════════════════════════════════════════
     PAGE: ADMIN — USER MANAGEMENT
═══════════════════════════════════════════════════ -->
<div id="page-admin-users" class="page">
  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-header">
        <div class="nav-logo" style="font-size:0.95rem;cursor:default">
          <span class="nav-logo-icon" style="width:32px;height:32px;font-size:0.9rem">🎓</span>UniGuide
        </div>
      </div>
      <div class="dash-nav-section">Dashboard</div>
      <div class="dash-nav-item" onclick="showDash('admin-dashboard')"><span class="nav-icon">🏠</span>Dashboard</div>
      <div class="dash-nav-section">Management</div>
      <div class="dash-nav-item active" onclick="showDash('admin-users')"><span class="nav-icon">👥</span>User Management</div>
      <div class="dash-nav-section">System</div>
      <div class="dash-nav-item" onclick="showDash('admin-settings')"><span class="nav-icon">⚙️</span>Settings</div>
      <div class="dash-nav-item" onclick="showDash('admin-chat')"><span class="nav-icon">💬</span>Messages</div>
      <div class="dash-sign-out"><button onclick="doLogout()">Sign Out</button></div>
    </aside>
    <main class="dash-main">
      <div class="dash-topbar">
        <div>
          <div class="dash-welcome">User <span>Management</span></div>
        </div>
        <div class="dash-topbar-right">
          <div class="dash-search"><span>🔍</span><input placeholder="Search users…"></div>
          <button class="btn btn-primary" style="font-size:0.82rem;padding:0.5rem 1.1rem" onclick="openModal('modal-add-user')">+ Add User</button>
        </div>
      </div>
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card">
          <div class="stat-icon stat-icon-green">✅</div>
          <div><div class="stat-num" id="au-active">—</div><div class="stat-label">Active</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-pink">🚫</div>
          <div><div class="stat-num" id="au-inactive">—</div><div class="stat-label">Inactive</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-purple">👥</div>
          <div><div class="stat-num" id="au-total">—</div><div class="stat-label">Total</div></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Users</div>
        <table class="dash-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="admin-user-tbody"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>
