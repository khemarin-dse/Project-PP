<!-- ═══════════════════════════════════════════════════
     PAGE: LOGIN
═══════════════════════════════════════════════════ -->
<div id="page-login" class="page">
  <div class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-logo-wrap" onclick="showPage('home')">
        <span class="auth-logo-icon">🎓</span>
        <span class="auth-logo-text">UniGuide</span>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab" onclick="showPage('register')">Sign Up</div>
          <div class="auth-tab active" onclick="showPage('login')">Log In</div>
        </div>
        <div id="login-alert" class="alert alert-error" style="display:none"></div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="login-pass" placeholder="Enter your password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" placeholder="Re-enter password">
        </div>
        <button class="btn-auth" onclick="doLogin()">Log In</button>
        <p class="auth-note">Don't have an account? <a onclick="showPage('register')">Sign up</a></p>
        <p class="auth-note" style="margin-top:0.5rem"><a onclick="showPage('admin-login')" class="auth-link-admin">Admin login →</a></p>
      </div>
    </div>
  </div>
</div>
