<!-- ═══════════════════════════════════════════════════
     PAGE: SUPER ADMIN — ACTIVITY LOGS (new)
═══════════════════════════════════════════════════ -->
<div id="page-sa-activitylogs" class="page">
  <div style="display:flex;min-height:100vh">
    
    <aside class="sa-sidebar">
      <div class="sa-sidebar-brand">
        <div class="sa-brand-icon">🛡️</div>
        <div>
          <div class="sa-brand-text">Super Admin</div>
        </div>
      </div>
      <div style="padding:0.75rem 0">
        <div class="sa-nav-item" onclick="showDash('sa-dashboard')"><span class="nav-icon">🏠</span>Dashboard</div>
      <div class="sa-nav-item" onclick="showDash('sa-management')"><span class="nav-icon">🛡️</span>Admins Management</div>
      <div class="sa-nav-item" onclick="showDash('sa-users')"><span class="nav-icon">👥</span>Users Management</div>
      <div class="sa-nav-item active" onclick="showDash('sa-activitylogs')"><span class="nav-icon">📋</span>Activity Logs</div>
      <div class="sa-nav-item" onclick="showDash('sa-settings')"><span class="nav-icon">⚙️</span>Setting</div>
      
      </div>
      <div class="sa-profile-foot" style="margin-top:auto;padding-bottom:0.5rem">
        <div class="sa-profile-avatar">👑</div>
        <div>
          <div class="sa-profile-name" id="sa-foot-name-sa-activitylogs">Tana Kong</div>
          <div class="sa-profile-role">Super Admin</div>
        </div>
      </div>
      <div class="sa-sign-out">
        <button onclick="doLogout()">↪ Sign out</button>
      </div>
    </aside>
    <div class="sa-main">
      
      <div class="sa-topbar">
        <div class="sa-topbar-left">
          <div class="sa-topbar-title">≡ Activity Logs</div>
        </div>
        <div class="sa-topbar-right">
          
          <div style="font-size:1.2rem;cursor:pointer;color:#7c3aed">🔔</div>
          <div class="sa-topbar-avatar">
            <div class="sa-topbar-avatar-img">👑</div>
            <div class="sa-topbar-avatar-info">
              <div class="name" id="sa-topbar-name">Tana Kong</div>
              <div class="role">Super Admin</div>
            </div>
          </div>
        </div>
      </div>
      <div class="sa-content">
        <!-- Search bar inside content -->
        <div style="margin-bottom:1.5rem">
          <div class="sa-topbar-search" style="max-width:320px;border-radius:10px">
            <span style="color:rgba(109,40,217,0.5)">🔍</span>
            <input placeholder="Search..." style="width:280px" oninput="filterActivityLogs(this.value)">
          </div>
        </div>
        <div class="sa-card">
          <table class="sa-table" id="activity-log-table">
            <thead><tr>
              <th style="width:30px"></th>
              <th>Activity</th><th>Admin</th><th>Date</th>
            </tr></thead>
            <tbody id="activity-log-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
